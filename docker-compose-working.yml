services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: virtual-tryon-db
    environment:
      POSTGRES_DB: virtual_tryon
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./DATABASE_SCHEMA.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - virtual-tryon-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: virtual-tryon-redis
    ports:
      - "6379:6379"
    networks:
      - virtual-tryon-network

  # Mock Backend (Node.js)
  backend:
    build:
      context: ./mock-backend
      dockerfile: Dockerfile
    container_name: virtual-tryon-backend
    environment:
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    networks:
      - virtual-tryon-network

  # AI Services
  ai-services:
    build:
      context: ./ai_services
      dockerfile: Dockerfile-simple
    container_name: virtual-tryon-ai
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/virtual_tryon
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - virtual-tryon-network

  # Simple Admin Dashboard
  admin-dashboard:
    build:
      context: ./simple-admin
      dockerfile: Dockerfile
    container_name: virtual-tryon-admin
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - virtual-tryon-network

volumes:
  postgres_data:

networks:
  virtual-tryon-network:
    driver: bridge