version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: virtual-tryon-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: virtual_tryon
      MYSQL_USER: tryon_user
      MYSQL_PASSWORD: tryon_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./DATABASE_SCHEMA.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - virtual-tryon-network

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: virtual-tryon-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/virtual_tryon?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - virtual-tryon-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: virtual-tryon-redis
    ports:
      - "6379:6379"
    networks:
      - virtual-tryon-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: virtual-tryon-frontend
    environment:
      REACT_APP_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - virtual-tryon-network

volumes:
  mysql_data:

networks:
  virtual-tryon-network:
    driver: bridge
